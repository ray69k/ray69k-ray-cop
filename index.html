<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .form-links {
            text-align: center;
            margin-top: 15px;
        }

        .form-links a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .form-links a:hover {
            text-decoration: underline;
        }

        .welcome-page h1 {
            font-size: 48px;
            color: #667eea;
        }

        .welcome-message {
            font-size: 24px;
            color: #555;
            margin-bottom: 30px;
            text-align: center;
        }

        .user-info {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: left;
        }

        .user-info p {
            margin: 10px 0;
            color: #666;
            font-size: 16px;
        }

        .user-info strong {
            color: #667eea;
        }

        .logout-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            width: auto;
            margin: 0 auto;
            display: block;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Page -->
        <div id="loginPage" class="page active">
            <h1>🔐 Login</h1>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="usernameOrEmail">Username/Email</label>
                    <input type="text" id="usernameOrEmail" placeholder="Enter your username or email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit">Login</button>
            </form>

            <div id="loginMessage" class="message"></div>

            <div class="form-links">
                <a id="forgotPasswordLink">Forgot Password?</a>
            </div>
        </div>

        <!-- Forgot Password Page -->
        <div id="forgotPasswordPage" class="page">
            <h2>🔑 Reset Password</h2>
            
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="resetUsernameOrEmail">Username/Email</label>
                    <input type="text" id="resetUsernameOrEmail" placeholder="Enter your username or email" required>
                </div>

                <button type="submit">Send Reset Link</button>
            </form>

            <div id="resetMessage" class="message"></div>

            <div class="form-links">
                <a id="backToLoginLink">Back to Login</a>
            </div>
        </div>

        <!-- Welcome Page -->
        <div id="welcomePage" class="page">
            <h1>👋 Welcome!</h1>
            <p class="welcome-message">Welcome to my page</p>
            
            <div class="user-info">
                <p><strong>Username/Email:</strong> <span id="displayUsernameOrEmail"></span></p>
            </div>

            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <script>
        // Clear old localStorage on first load
        localStorage.removeItem('currentUser');

        // Elements
        const loginPage = document.getElementById('loginPage');
        const forgotPasswordPage = document.getElementById('forgotPasswordPage');
        const welcomePage = document.getElementById('welcomePage');

        const loginForm = document.getElementById('loginForm');
        const forgotPasswordForm = document.getElementById('forgotPasswordForm');

        const usernameOrEmailInput = document.getElementById('usernameOrEmail');
        const passwordInput = document.getElementById('password');
        const resetUsernameOrEmailInput = document.getElementById('resetUsernameOrEmail');

        const loginMessage = document.getElementById('loginMessage');
        const resetMessage = document.getElementById('resetMessage');

        const forgotPasswordLink = document.getElementById('forgotPasswordLink');
        const backToLoginLink = document.getElementById('backToLoginLink');
        const logoutBtn = document.getElementById('logoutBtn');

        // Show page function
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            page.classList.add('active');
        }

        // Login handler
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const usernameOrEmail = usernameOrEmailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!usernameOrEmail || !password) {
                loginMessage.textContent = 'Please fill in all fields';
                loginMessage.className = 'message error';
                return;
            }

            const userData = { usernameOrEmail: usernameOrEmail };
            localStorage.setItem('currentUser', JSON.stringify(userData));

            loginMessage.textContent = 'Login successful! Welcome';
            loginMessage.className = 'message success';

            loginForm.reset();

            setTimeout(() => {
                document.getElementById('displayUsernameOrEmail').textContent = usernameOrEmail;
                showPage(welcomePage);
            }, 1000);
        });

        // Forgot Password link
        forgotPasswordLink.addEventListener('click', function(e) {
            e.preventDefault();
            showPage(forgotPasswordPage);
        });

        // Back to Login link
        backToLoginLink.addEventListener('click', function(e) {
            e.preventDefault();
            showPage(loginPage);
        });

        // Forgot Password form handler
        forgotPasswordForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const resetUsernameOrEmail = resetUsernameOrEmailInput.value.trim();

            if (!resetUsernameOrEmail) {
                resetMessage.textContent = 'Please enter your username or email';
                resetMessage.className = 'message error';
                return;
            }

            resetMessage.textContent = `Password reset link sent to ${resetUsernameOrEmail}. Check your email!`;
            resetMessage.className = 'message success';

            forgotPasswordForm.reset();

            setTimeout(() => {
                showPage(loginPage);
            }, 2000);
        });

        // Logout handler
        logoutBtn.addEventListener('click', function() {
            localStorage.removeItem('currentUser');
            showPage(loginPage);
        });
    </script>
</body>
</html>
