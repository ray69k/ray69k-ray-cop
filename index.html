<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a3e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBackground 20s linear infinite;
            z-index: 0;
        }

        @keyframes moveBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            background: rgba(20, 20, 40, 0.8);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 255, 255, 0.1), 
                        0 0 50px rgba(255, 107, 107, 0.05),
                        inset 0 0 20px rgba(255, 255, 255, 0.05);
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.1);
            position: relative;
            z-index: 1;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #00ffff 0%, #ff006e 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5),
                        0 0 60px rgba(255, 0, 110, 0.3);
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 255, 255, 0.5), 0 0 60px rgba(255, 0, 110, 0.3); }
            50% { box-shadow: 0 0 40px rgba(0, 255, 255, 0.7), 0 0 80px rgba(255, 0, 110, 0.5); }
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #00ffff 0%, #ff006e 50%, #ffa500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .subtitle {
            text-align: center;
            color: #00ffff;
            font-size: 12px;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        h2 {
            text-align: center;
            background: linear-gradient(135deg, #00ffff 0%, #ff006e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            font-size: 26px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #00ffff;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            color: #ff006e;
            font-size: 18px;
            z-index: 2;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            font-size: 14px;
            color: #ffffff;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: rgba(0, 255, 255, 0.5);
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #00ffff;
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3),
                        inset 0 0 10px rgba(0, 255, 255, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00ffff 0%, #ff006e 50%, #ffa500 100%);
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4),
                        0 0 20px rgba(255, 0, 110, 0.2);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.6),
                        0 0 30px rgba(255, 0, 110, 0.4);
        }

        button:active {
            transform: translateY(-1px);
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 13px;
            display: none;
            border-left: 4px solid;
            backdrop-filter: blur(10px);
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: rgba(0, 255, 100, 0.1);
            color: #00ff64;
            border-left-color: #00ff64;
        }

        .message.error {
            background: rgba(255, 0, 110, 0.1);
            color: #ff006e;
            border-left-color: #ff006e;
        }

        .form-links {
            text-align: center;
            margin-top: 20px;
        }

        .form-links a {
            color: #00ffff;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            position: relative;
        }

        .form-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00ffff, #ff006e);
            transition: width 0.3s ease;
        }

        .form-links a:hover::after {
            width: 100%;
        }

        .form-links a:hover {
            color: #ff006e;
        }

        .welcome-page h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .welcome-message {
            font-size: 24px;
            color: #ffa500;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .user-info {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(255, 0, 110, 0.05));
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: left;
            border: 1px solid rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.05);
        }

        .user-info p {
            margin: 15px 0;
            color: #ffffff;
            font-size: 16px;
            display: flex;
            align-items: center;
        }

        .user-info strong {
            color: #00ffff;
            margin-right: 10px;
            min-width: 150px;
        }

        .user-info i {
            color: #ff006e;
            margin-right: 10px;
            font-size: 18px;
        }

        .logout-btn {
            padding: 14px 30px;
            background: linear-gradient(135deg, #ff006e 0%, #ffa500 100%);
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            width: auto;
            margin: 0 auto;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.4);
        }

        .logout-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px rgba(255, 0, 110, 0.6);
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: slideIn 0.6s ease-out;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
            margin: 25px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Page -->
        <div id="loginPage" class="page active">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-lock"></i>
                </div>
                <h1>Elite</h1>
                <p class="subtitle">Secure Access Portal</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="usernameOrEmail"><i class="fas fa-user"></i> Username/Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="usernameOrEmail" placeholder="Enter your credentials" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-key"></i> Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <button type="submit">🚀 Login</button>
            </form>

            <div id="loginMessage" class="message"></div>

            <div class="divider"></div>

            <div class="form-links">
                <a id="forgotPasswordLink">Forgot Password?</a>
            </div>
        </div>

        <!-- Forgot Password Page -->
        <div id="forgotPasswordPage" class="page">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-key"></i>
                </div>
                <h2>Reset Password</h2>
                <p class="subtitle">Recover Your Access</p>
            </div>
            
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="resetUsernameOrEmail"><i class="fas fa-envelope"></i> Username/Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="text" id="resetUsernameOrEmail" placeholder="Enter your email" required>
                    </div>
                </div>

                <button type="submit">📧 Send Reset Link</button>
            </form>

            <div id="resetMessage" class="message"></div>

            <div class="divider"></div>

            <div class="form-links">
                <a id="backToLoginLink">Back to Login</a>
            </div>
        </div>

        <!-- Welcome Page -->
        <div id="welcomePage" class="page">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
            </div>
            <h1>Welcome!</h1>
            <p class="welcome-message">Welcome to my page</p>
            
            <div class="user-info">
                <p><i class="fas fa-user-circle"></i> <strong>Account:</strong> <span id="displayUsernameOrEmail"></span></p>
                <p><i class="fas fa-shield-alt"></i> <strong>Status:</strong> <span style="color: #00ff64;">✓ Authenticated</span></p>
            </div>

            <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
        </div>
    </div>

    <script>
        // Clear old localStorage on first load
        localStorage.removeItem('currentUser');

        // Elements
        const loginPage = document.getElementById('loginPage');
        const forgotPasswordPage = document.getElementById('forgotPasswordPage');
        const welcomePage = document.getElementById('welcomePage');

        const loginForm = document.getElementById('loginForm');
        const forgotPasswordForm = document.getElementById('forgotPasswordForm');

        const usernameOrEmailInput = document.getElementById('usernameOrEmail');
        const passwordInput = document.getElementById('password');
        const resetUsernameOrEmailInput = document.getElementById('resetUsernameOrEmail');

        const loginMessage = document.getElementById('loginMessage');
        const resetMessage = document.getElementById('resetMessage');

        const forgotPasswordLink = document.getElementById('forgotPasswordLink');
        const backToLoginLink = document.getElementById('backToLoginLink');
        const logoutBtn = document.getElementById('logoutBtn');

        // Show page function
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            page.classList.add('active');
        }

        // Login handler
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const usernameOrEmail = usernameOrEmailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!usernameOrEmail || !password) {
                loginMessage.textContent = '⚠️ Please fill in all fields';
                loginMessage.className = 'message error';
                return;
            }

            const userData = { usernameOrEmail: usernameOrEmail };
            localStorage.setItem('currentUser', JSON.stringify(userData));

            loginMessage.textContent = '✓ Login successful! Redirecting...';
            loginMessage.className = 'message success';

            loginForm.reset();

            setTimeout(() => {
                document.getElementById('displayUsernameOrEmail').textContent = usernameOrEmail;
                showPage(welcomePage);
            }, 1000);
        });

        // Forgot Password link
        forgotPasswordLink.addEventListener('click', function(e) {
            e.preventDefault();
            showPage(forgotPasswordPage);
        });

        // Back to Login link
        backToLoginLink.addEventListener('click', function(e) {
            e.preventDefault();
            showPage(loginPage);
        });

        // Forgot Password form handler
        forgotPasswordForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const resetUsernameOrEmail = resetUsernameOrEmailInput.value.trim();

            if (!resetUsernameOrEmail) {
                resetMessage.textContent = '⚠️ Please enter your username or email';
                resetMessage.className = 'message error';
                return;
            }

            resetMessage.textContent = `✓ Password reset link sent to ${resetUsernameOrEmail}. Check your email!`;
            resetMessage.className = 'message success';

            forgotPasswordForm.reset();

            setTimeout(() => {
                showPage(loginPage);
            }, 2000);
        });

        // Logout handler
        logoutBtn.addEventListener('click', function() {
            localStorage.removeItem('currentUser');
            showPage(loginPage);
        });
    </script>
</body>
</html>
