<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .form-links {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .form-links a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }

        .form-links a:hover {
            text-decoration: underline;
        }

        /* Welcome Page Styles */
        .welcome-page {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease-in;
        }

        .welcome-page.active {
            display: block;
        }

        .welcome-page h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #667eea;
        }

        .welcome-message {
            font-size: 24px;
            color: #555;
            margin-bottom: 30px;
        }

        .user-info {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: left;
        }

        .user-info p {
            margin: 10px 0;
            color: #666;
            font-size: 16px;
        }

        .user-info strong {
            color: #667eea;
        }

        .logout-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            width: auto;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
        }

        /* Page visibility */
        .login-page,
        .forgot-password-page {
            display: block;
        }

        .login-page.hidden,
        .forgot-password-page.hidden {
            display: none;
        }

        .forgot-password-page.hidden {
            display: none;
        }

        .forgot-password-page {
            display: none;
        }

        .forgot-password-page.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Page -->
        <div id="loginPage" class="login-page">
            <h1>🔐 Login</h1>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="usernameOrEmail">Username/Email</label>
                    <input type="text" id="usernameOrEmail" placeholder="Enter your username or email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit">Login</button>
            </form>

            <div id="message" class="message"></div>

            <div class="form-links">
                <a id="forgotPasswordLink">Forgot Password?</a>
            </div>
        </div>

        <!-- Forgot Password Page -->
        <div id="forgotPasswordPage" class="forgot-password-page">
            <h2>🔑 Reset Password</h2>
            
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="resetUsernameOrEmail">Username/Email</label>
                    <input type="text" id="resetUsernameOrEmail" placeholder="Enter your username or email" required>
                </div>

                <button type="submit">Send Reset Link</button>
            </form>

            <div id="forgotPasswordMessage" class="message"></div>

            <div class="form-links">
                <a id="backToLoginLink">Back to Login</a>
            </div>
        </div>

        <!-- Welcome Page -->
        <div id="welcomePage" class="welcome-page">
            <h1>👋 Welcome!</h1>
            <p class="welcome-message">Welcome to my page</p>
            
            <div class="user-info">
                <p><strong>Username/Email:</strong> <span id="displayUsernameOrEmail"></span></p>
            </div>

            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const forgotPasswordForm = document.getElementById('forgotPasswordForm');
        const loginPage = document.getElementById('loginPage');
        const forgotPasswordPage = document.getElementById('forgotPasswordPage');
        const welcomePage = document.getElementById('welcomePage');
        const usernameOrEmailInput = document.getElementById('usernameOrEmail');
        const passwordInput = document.getElementById('password');
        const resetUsernameOrEmailInput = document.getElementById('resetUsernameOrEmail');
        const messageDiv = document.getElementById('message');
        const forgotPasswordMessageDiv = document.getElementById('forgotPasswordMessage');
        const logoutBtn = document.getElementById('logoutBtn');
        const forgotPasswordLink = document.getElementById('forgotPasswordLink');
        const backToLoginLink = document.getElementById('backToLoginLink');

        // Check if user is already logged in
        window.addEventListener('load', function() {
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                showWelcomePage(JSON.parse(currentUser));
            }
        });

        // Login form submission
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const usernameOrEmail = usernameOrEmailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!usernameOrEmail || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            // Store user data
            const userData = {
                usernameOrEmail: usernameOrEmail
            };

            localStorage.setItem('currentUser', JSON.stringify(userData));

            // Show success message briefly
            showMessage(`Login successful! Welcome`, 'success');

            // Clear form
            loginForm.reset();

            // Redirect to welcome page after 1 second
            setTimeout(() => {
                showWelcomePage(userData);
            }, 1000);
        });

        // Forgot Password link click
        forgotPasswordLink.addEventListener('click', function(e) {
            e.preventDefault();
            showForgotPasswordPage();
        });

        // Back to Login link click
        backToLoginLink.addEventListener('click', function(e) {
            e.preventDefault();
            showLoginPage();
        });

        // Forgot Password form submission
        forgotPasswordForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const resetUsernameOrEmail = resetUsernameOrEmailInput.value.trim();

            if (!resetUsernameOrEmail) {
                showForgotPasswordMessage('Please enter your username or email', 'error');
                return;
            }

            // Show success message
            showForgotPasswordMessage(`Password reset link sent to ${resetUsernameOrEmail}. Check your email!`, 'success');

            // Clear form
            forgotPasswordForm.reset();

            // Redirect back to login after 2 seconds
            setTimeout(() => {
                showLoginPage();
            }, 2000);
        });

        function showWelcomePage(userData) {
            loginPage.classList.add('hidden');
            forgotPasswordPage.classList.add('hidden');
            welcomePage.classList.add('active');
            
            document.getElementById('displayUsernameOrEmail').textContent = userData.usernameOrEmail;
        }

        function showLoginPage() {
            loginPage.classList.remove('hidden');
            forgotPasswordPage.classList.add('hidden');
            welcomePage.classList.remove('active');
            loginForm.reset();
            messageDiv.classList.remove('success', 'error');
            forgotPasswordMessageDiv.classList.remove('success', 'error');
        }

        function showForgotPasswordPage() {
            loginPage.classList.add('hidden');
            forgotPasswordPage.classList.remove('hidden');
            welcomePage.classList.remove('active');
            forgotPasswordForm.reset();
            forgotPasswordMessageDiv.classList.remove('success', 'error');
        }

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
        }

        function showForgotPasswordMessage(text, type) {
            forgotPasswordMessageDiv.textContent = text;
            forgotPasswordMessageDiv.className = `message ${type}`;
        }

        logoutBtn.addEventListener('click', function() {
            localStorage.removeItem('currentUser');
            showLoginPage();
        });
    </script>
</body>
</html>
